<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Birthday AR Filter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:black;
}

/* CAMERA */

#video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* MESSAGE */

#message{
    position:fixed;
    top:40px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2.3rem;
    font-weight:bold;
    text-shadow:0 0 15px black;
    z-index:10;
}

/* CAKE */

#cakeContainer{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    animation:float 2s ease-in-out infinite;
    z-index:10;
}

@keyframes float{
    0%{
        transform:translateX(-50%) translateY(0);
    }

    50%{
        transform:translateX(-50%) translateY(-10px);
    }

    100%{
        transform:translateX(-50%) translateY(0);
    }
}

.candles{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:-10px;
}

.candle{
    width:14px;
    height:55px;
    background:white;
    border-radius:5px;
    position:relative;
}

.flame{
    width:18px;
    height:22px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
    animation:flicker .2s infinite alternate;
}

@keyframes flicker{
    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.15);
    }
}

#cake{
    width:280px;
    height:130px;
    background:linear-gradient(to bottom,#ff9ecb,#ff5ca8);
    border-radius:25px;
    position:relative;
    overflow:hidden;
}

#cake::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:30px;
    background:#fff;
    border-radius:50%;
}

/* HAPPY BIRTHDAY */

#birthday{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    display:none;
    z-index:20;
    animation:pop 1s ease;
}

#birthday h1{
    font-size:3rem;
    text-shadow:0 0 20px hotpink;
}

#birthday p{
    font-size:5rem;
}

@keyframes pop{

    from{
        transform:translate(-50%,-50%) scale(0);
        opacity:0;
    }

    to{
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
    }
}

/* CONFETTI */

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall linear forwards;
    z-index:15;
}

@keyframes fall{

    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

</style>
</head>

<body>

<!-- CAMERA -->

<video
    id="video"
    autoplay
    muted
    playsinline>
</video>

<!-- MESSAGE -->

<div id="message">
    Loading AI...
</div>

<!-- CAKE -->

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake"></div>

</div>

<!-- BIRTHDAY -->

<div id="birthday">

    <p>🎉🎂🎉</p>

    <h1>HAPPY BIRTHDAY</h1>

</div>

<!-- Tensorflow -->

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

let model;

let candlesBlown = false;

/* START CAMERA */

async function setupCamera(){

    try{

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                facingMode:"user"
            },

            audio:false
        });

        video.srcObject = stream;

        return new Promise(resolve=>{

            video.onloadedmetadata = ()=>{

                resolve(video);
            };
        });

    }catch(error){

        alert(
            "Camera access denied"
        );

        console.log(error);
    }
}

/* LOAD AI MODEL */

async function loadAI(){

    model =
    await blazeface.load();

    message.innerHTML =
    "Find your face...";
}

/* CONFETTI */

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.animationDuration =
        (Math.random()*3+2)+"s";

        confetti.style.opacity =
        Math.random();

        confetti.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        document.body.appendChild(
            confetti
        );

        setTimeout(()=>{

            confetti.remove();

        },5000);
    }
}

/* DETECT FACE */

async function detectFace(){

    const predictions =
    await model.estimateFaces(
        video,
        false
    );

    if(predictions.length > 0){

        cakeContainer.style.display =
        "block";

        if(!candlesBlown){

            message.innerHTML =
            "Come closer & open mouth 🎂";

            const face =
            predictions[0];

            const topLeft =
            face.topLeft;

            const bottomRight =
            face.bottomRight;

            const faceHeight =
            bottomRight[1] -
            topLeft[1];

            /*
            MOBILE FRIENDLY
            SIMPLE BLOW DETECTION
            */

            if(faceHeight > 320){

                candlesBlown = true;

                document
                .querySelectorAll(".flame")
                .forEach(flame=>{

                    flame.style.display =
                    "none";
                });

                message.style.display =
                "none";

                birthday.style.display =
                "block";

                createConfetti();
            }
        }

    }else{

        cakeContainer.style.display =
        "none";

        if(!candlesBlown){

            message.innerHTML =
            "Find your face...";
        }
    }

    requestAnimationFrame(
        detectFace
    );
}

/* INIT */

async function init(){

    await setupCamera();

    await loadAI();

    detectFace();
}

init();

</script>

</body>
</html>
