<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Birthday Face Filter</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#message{
    position:fixed;
    top:30px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
    z-index:100;
    text-shadow:0 0 10px black;
}

#cakeContainer{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    z-index:100;
}

.candles{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:-10px;
}

.candle{
    width:12px;
    height:50px;
    background:white;
    border-radius:4px;
    position:relative;
}

.flame{
    width:18px;
    height:18px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
    animation:flicker .2s infinite alternate;
}

@keyframes flicker{
    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.2);
    }
}

#cake{
    width:260px;
    height:120px;
    background:pink;
    border-radius:20px;
    border-bottom:10px solid hotpink;
}

#birthday{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    display:none;
    z-index:200;
}

#birthday h1{
    font-size:3rem;
    text-shadow:0 0 20px hotpink;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

</style>
</head>

<body>

<video
id="video"
autoplay
playsinline
muted>
</video>

<div id="message">
Loading AI...
</div>

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake"></div>

</div>

<div id="birthday">

    <h1>🎉 HAPPY BIRTHDAY 🎂</h1>

</div>

<!-- FACE API -->

<script src="https://unpkg.com/face-api.js"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

let blown = false;

/* CONFETTI */

function confetti(){

    for(let i=0;i<100;i++){

        const c =
        document.createElement("div");

        c.className =
        "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* CAMERA */

async function startCamera(){

    const stream =
    await navigator
    .mediaDevices
    .getUserMedia({

        video:{
            facingMode:"user"
        },

        audio:false
    });

    video.srcObject =
    stream;
}

/* LOAD MODEL */

async function loadModels(){

    const MODEL_URL =
    "https://justadudewhohacks.github.io/face-api.js/models";

    await faceapi.nets
    .tinyFaceDetector
    .loadFromUri(MODEL_URL);

    await faceapi.nets
    .faceLandmark68TinyNet
    .loadFromUri(MODEL_URL);

    message.innerHTML =
    "Find a face...";
}

/* MOUTH DETECTION */

function getMouthRatio(
landmarks
){

    const mouth =
    landmarks.getMouth();

    const top =
    mouth[13];

    const bottom =
    mouth[19];

    const left =
    mouth[0];

    const right =
    mouth[6];

    const vertical =
    Math.abs(
        bottom.y - top.y
    );

    const horizontal =
    Math.abs(
        right.x - left.x
    );

    return vertical /
    horizontal;
}

/* DETECT */

async function detect(){

    const detection =
    await faceapi
    .detectSingleFace(
        video,
        new faceapi
        .TinyFaceDetectorOptions()
    )
    .withFaceLandmarks(
        true
    );

    if(detection){

        cakeContainer.style.display =
        "block";

        if(!blown){

            message.innerHTML =
            "Open mouth to blow 🎂";
        }

        const ratio =
        getMouthRatio(
            detection.landmarks
        );

        console.log(ratio);

        if(
            ratio > 0.30 &&
            !blown
        ){

            blown = true;

            document
            .querySelectorAll(".flame")
            .forEach(f=>{

                f.style.display =
                "none";
            });

            message.style.display =
            "none";

            birthday.style.display =
            "block";

            confetti();
        }

    }else{

        cakeContainer.style.display =
        "none";

        if(!blown){

            message.innerHTML =
            "Find a face...";
        }
    }

    requestAnimationFrame(
        detect
    );
}

/* START */

async function init(){

    try{

        await startCamera();

        await loadModels();

        detect();

    }catch(err){

        console.log(err);

        alert(
        "Model failed to load"
        );
    }
}

init();

</script>

</body>
</html>
