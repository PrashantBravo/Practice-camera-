<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Romantic Birthday AR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:black;
}

/* CAMERA */

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);

    filter:
    brightness(1.05)
    contrast(1.08)
    saturate(1.15)
    blur(.2px);
}

/* BEAUTY FILTER */

#beautyGlow{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:5;

    background:
    radial-gradient(
    circle,
    rgba(255,182,193,.08),
    transparent 60%
    );
}

/* MESSAGE */

#message{
    position:fixed;
    top:35px;
    width:100%;
    text-align:center;

    color:white;

    font-size:2rem;
    font-weight:bold;

    z-index:200;

    text-shadow:
    0 0 15px black;
}

/* BALLOONS */

.balloon{
    position:fixed;
    bottom:-150px;

    font-size:65px;

    z-index:20;

    animation:
    floatUp linear infinite;
}

@keyframes floatUp{

    to{
        transform:
        translateY(-120vh);
    }
}

/* SPARKLES */

.sparkle{
    position:fixed;

    font-size:22px;

    z-index:30;

    pointer-events:none;

    animation:
    sparkleAnim 1s linear forwards;
}

@keyframes sparkleAnim{

    0%{
        opacity:0;

        transform:
        translateY(0)
        scale(0);
    }

    50%{
        opacity:1;

        transform:
        translateY(-10px)
        scale(1);
    }

    100%{
        opacity:0;

        transform:
        translateY(-20px)
        scale(0);
    }
}

/* HEARTS */

.heart{
    position:fixed;

    bottom:-50px;

    font-size:35px;

    z-index:260;

    animation:
    heartFloat linear forwards;
}

@keyframes heartFloat{

    to{
        transform:
        translateY(-120vh)
        rotate(360deg);

        opacity:0;
    }
}

/* CAKE */

#cakeContainer{
    position:fixed;

    bottom:120px;
    left:50%;

    transform:
    translateX(-50%);

    z-index:100;

    display:none;

    animation:
    floatCake 2s ease-in-out infinite;
}

@keyframes floatCake{

    0%{
        transform:
        translateX(-50%)
        translateY(0);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-12px);
    }

    100%{
        transform:
        translateX(-50%)
        translateY(0);
    }
}

/* CANDLES */

.candles{
    display:flex;
    justify-content:center;

    gap:40px;

    margin-bottom:-10px;

    position:relative;

    z-index:5;
}

.candle{
    width:16px;
    height:70px;

    background:white;

    border-radius:5px;

    position:relative;
}

/* FLAME */

.flame{
    width:22px;
    height:28px;

    background:orange;

    border-radius:50%;

    position:absolute;

    top:-25px;
    left:50%;

    transform:
    translateX(-50%);

    box-shadow:
    0 0 20px yellow,
    0 0 40px orange;

    animation:
    flicker .12s infinite alternate;
}

@keyframes flicker{

    from{
        transform:
        translateX(-50%)
        scale(1);
    }

    to{
        transform:
        translateX(-50%)
        scale(1.2);
    }
}

/* SMOKE */

.smoke{
    position:absolute;

    width:20px;
    height:20px;

    background:
    rgba(220,220,220,.6);

    border-radius:50%;

    animation:
    smokeUp 2s linear forwards;
}

@keyframes smokeUp{

    to{
        transform:
        translateY(-120px)
        scale(2);

        opacity:0;
    }
}

/* DOUBLE CAKE */

#cake{
    position:relative;

    width:360px;
    height:240px;
}

/* LOWER LAYER */

#cake::before{
    content:"";

    position:absolute;

    bottom:0;
    left:0;

    width:360px;
    height:130px;

    background:
    linear-gradient(
    to bottom,
    #ff9ecb,
    #ff4f9d
    );

    border-radius:25px;

    border-bottom:
    12px solid #ff187b;

    box-shadow:
    0 0 30px rgba(255,105,180,.5);
}

/* TOP LAYER */

#cake::after{
    content:"";

    position:absolute;

    top:0;
    left:50%;

    transform:
    translateX(-50%);

    width:240px;
    height:100px;

    background:
    linear-gradient(
    to bottom,
    #ffd1e6,
    #ff82bb
    );

    border-radius:22px;

    border-bottom:
    10px solid #ff3b8b;
}

/* CREAM */

.cakeCream1{
    position:absolute;

    top:85px;
    left:0;

    width:360px;
    height:28px;

    background:white;

    border-radius:50%;

    z-index:3;
}

.cakeCream2{
    position:absolute;

    top:0;
    left:50%;

    transform:
    translateX(-50%);

    width:240px;
    height:24px;

    background:white;

    border-radius:50%;

    z-index:3;
}

/* ROMANTIC TEXT */

#birthday{
    position:fixed;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    z-index:300;

    text-align:center;

    display:none;

    animation:
    romanticPop 1.5s ease;
}

#birthday h1{

    font-size:4rem;

    line-height:1.3;

    font-weight:700;

    background:
    linear-gradient(
    45deg,
    #ffb6d9,
    #ff69b4,
    #ffd6ec
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:
    transparent;

    text-shadow:
    0 0 20px rgba(255,105,180,.7),
    0 0 40px rgba(255,182,193,.6);
}

#birthday p{

    font-size:6rem;

    animation:
    heartBeat 1s infinite;
}

@keyframes romanticPop{

    from{

        opacity:0;

        transform:
        translate(-50%,-50%)
        scale(.4);
    }

    to{

        opacity:1;

        transform:
        translate(-50%,-50%)
        scale(1);
    }
}

@keyframes heartBeat{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

/* CONFETTI */

.confetti{
    position:fixed;

    width:12px;
    height:12px;

    top:-10px;

    z-index:250;

    animation:
    fall linear forwards;
}

@keyframes fall{

    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

/* DANCING CAT */

#cat{

    position:fixed;

    bottom:30px;
    right:20px;

    font-size:95px;

    z-index:400;

    display:none;

    filter:
    drop-shadow(0 0 15px rgba(255,255,255,.5));

    animation:
    dance 1s infinite alternate,
    glowCat 2s infinite alternate;
}

@keyframes dance{

    0%{

        transform:
        rotate(-12deg)
        translateY(0)
        scale(1);
    }

    25%{

        transform:
        rotate(12deg)
        translateY(-10px)
        scale(1.05);
    }

    50%{

        transform:
        rotate(-12deg)
        translateY(0)
        scale(1);
    }

    75%{

        transform:
        rotate(12deg)
        translateY(-10px)
        scale(1.05);
    }

    100%{

        transform:
        rotate(-12deg)
        translateY(0)
        scale(1);
    }
}

@keyframes glowCat{

    from{

        filter:
        drop-shadow(0 0 10px hotpink);
    }

    to{

        filter:
        drop-shadow(0 0 25px deeppink);
    }
}

/* CAPTURE BUTTON */

#captureBtn{
    position:fixed;

    bottom:20px;
    left:20px;

    z-index:500;

    border:none;

    background:white;
    color:black;

    padding:15px 20px;

    border-radius:50px;

    font-size:16px;
    font-weight:bold;

    box-shadow:
    0 0 20px rgba(0,0,0,.4);
}

#snapshot{
    display:none;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video
id="video"
autoplay
playsinline
muted>
</video>

<!-- BEAUTY FILTER -->

<div id="beautyGlow"></div>

<!-- MESSAGE -->

<div id="message">
Loading Camera...
</div>

<!-- BALLOONS -->

<div class="balloon"
style="left:5%;animation-duration:12s;">
🎈
</div>

<div class="balloon"
style="left:25%;animation-duration:10s;">
🎈
</div>

<div class="balloon"
style="left:50%;animation-duration:14s;">
🎈
</div>

<div class="balloon"
style="left:75%;animation-duration:11s;">
🎈
</div>

<div class="balloon"
style="left:90%;animation-duration:13s;">
🎈
</div>

<!-- CAKE -->

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake">

        <div class="cakeCream1"></div>

        <div class="cakeCream2"></div>

    </div>

</div>

<!-- BIRTHDAY -->

<div id="birthday">

    <p>💖</p>

    <h1>
        Happy Birthday<br>
        My Baby Girl
    </h1>

</div>

<!-- DANCING CAT -->

<div id="cat">
😺🎉
</div>

<!-- BUTTON -->

<button id="captureBtn">
📸 Capture
</button>

<canvas id="snapshot"></canvas>

<!-- MUSIC -->

<audio
id="music"
loop
preload="auto">

<source
src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"
type="audio/mpeg">

</audio>

<!-- MEDIAPIPE -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

const music =
document.getElementById("music");

const captureBtn =
document.getElementById("captureBtn");

const snapshot =
document.getElementById("snapshot");

const cat =
document.getElementById("cat");

let blown = false;

/* CONFETTI */

function confetti(){

    for(let i=0;i<180;i++){

        const c =
        document.createElement("div");

        c.className =
        "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* HEARTS */

function hearts(){

    for(let i=0;i<40;i++){

        const h =
        document.createElement("div");

        h.className =
        "heart";

        h.innerHTML =
        Math.random() > .5 ?
        "💖" : "💕";

        h.style.left =
        Math.random()*100 + "vw";

        h.style.animationDuration =
        (Math.random()*4+3)+"s";

        document.body.appendChild(h);

        setTimeout(()=>{
            h.remove();
        },7000);
    }
}

/* SPARKLES */

function sparkle(){

    const s =
    document.createElement("div");

    s.className =
    "sparkle";

    s.innerHTML =
    "✨";

    s.style.left =
    Math.random()*100 + "vw";

    s.style.top =
    Math.random()*100 + "vh";

    document.body.appendChild(s);

    setTimeout(()=>{
        s.remove();
    },1000);
}

setInterval(sparkle,300);

/* SMOKE */

function smoke(){

    document
    .querySelectorAll(".candle")
    .forEach(candle=>{

        const s =
        document.createElement("div");

        s.className =
        "smoke";

        s.style.left =
        "0px";

        candle.appendChild(s);

        setTimeout(()=>{
            s.remove();
        },2000);
    });
}

/* FACEMESH */

const faceMesh =
new window.FaceMesh({

    locateFile:(file)=>{

        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
});

faceMesh.setOptions({

    maxNumFaces:1,

    refineLandmarks:true,

    minDetectionConfidence:.5,

    minTrackingConfidence:.5
});

/* RESULTS */

faceMesh.onResults(results=>{

    if(
        results.multiFaceLandmarks &&
        results.multiFaceLandmarks.length > 0
    ){

        cakeContainer.style.display =
        "block";

        const landmarks =
        results.multiFaceLandmarks[0];

        const upperLip =
        landmarks[13];

        const lowerLip =
        landmarks[14];

        const mouthOpen =
        Math.abs(
            lowerLip.y -
            upperLip.y
        );

        if(!blown){

            message.innerHTML =
            "Open mouth to blow 🎂";
        }

        if(
            mouthOpen > 0.055 &&
            !blown
        ){

            blown = true;

            document
            .querySelectorAll(".flame")
            .forEach(flame=>{

                flame.style.display =
                "none";
            });

            smoke();

            message.style.display =
            "none";

            birthday.style.display =
            "block";

            cat.style.display =
            "block";

            confetti();

            hearts();

            music.volume = .8;

            music.play()
            .catch(()=>{

                console.log(
                "Autoplay blocked"
                );
            });
        }

    }else{

        cakeContainer.style.display =
        "none";

        if(!blown){

            message.innerHTML =
            "Find a face...";
        }
    }
});

/* CAMERA */

async function start(){

    try{

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                facingMode:"user",
                width:640,
                height:480
            },

            audio:false
        });

        video.srcObject =
        stream;

        await video.play();

        const camera =
        new window.Camera(video,{

            onFrame:async()=>{

                await faceMesh.send({
                    image:video
                });
            },

            width:640,
            height:480
        });

        camera.start();

        message.innerHTML =
        "Find a face...";

    }catch(err){

        console.log(err);

        alert(
        "Camera permission denied"
        );
    }
}

start();

/* CAPTURE */

captureBtn.onclick = ()=>{

    snapshot.width =
    video.videoWidth;

    snapshot.height =
    video.videoHeight;

    const ctx =
    snapshot.getContext("2d");

    ctx.drawImage(
        video,
        0,
        0
    );

    const link =
    document.createElement("a");

    link.download =
    "romantic-birthday.png";

    link.href =
    snapshot.toDataURL();

    link.click();
};

</script>

</body>
</html>
