<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Camera Filter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:black;
}

/* CAMERA */

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* MESSAGE */

#message{
    position:fixed;
    top:35px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
    z-index:100;
    text-shadow:0 0 12px black;
}

/* FACE DETECTED GLOW */

#faceGlow{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:20;
    box-shadow:
    inset 0 0 120px rgba(255,105,180,.3);
    display:none;
}

/* CAKE */

#cakeContainer{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    display:none;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateX(-50%)
        translateY(0);
    }

    50%{
        transform:translateX(-50%)
        translateY(-10px);
    }

    100%{
        transform:translateX(-50%)
        translateY(0);
    }
}

.candles{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:-8px;
}

.candle{
    width:14px;
    height:52px;
    background:white;
    border-radius:5px;
    position:relative;
}

.flame{
    width:18px;
    height:22px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
    animation:flicker .15s infinite alternate;
}

@keyframes flicker{

    from{
        transform:translateX(-50%)
        scale(1);
    }

    to{
        transform:translateX(-50%)
        scale(1.2);
    }
}

#cake{
    width:290px;
    height:130px;
    background:
    linear-gradient(
    to bottom,
    #ff9ecb,
    #ff5ea8
    );

    border-radius:25px;
    border-bottom:10px solid #ff2f92;
    position:relative;
}

#cake::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:28px;
    background:white;
    border-radius:50%;
}

/* BIRTHDAY */

#birthday{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:300;
    text-align:center;
    color:white;
    display:none;
    animation:pop 1s ease;
}

#birthday h1{
    font-size:3.5rem;
    text-shadow:0 0 25px hotpink;
}

#birthday p{
    font-size:5rem;
}

@keyframes pop{

    from{
        transform:
        translate(-50%,-50%)
        scale(0);
        opacity:0;
    }

    to{
        transform:
        translate(-50%,-50%)
        scale(1);
        opacity:1;
    }
}

/* CONFETTI */

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    top:-10px;
    z-index:200;
    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

</style>
</head>

<body>

<!-- CAMERA -->

<video
id="video"
autoplay
playsinline
muted>
</video>

<!-- FACE GLOW -->

<div id="faceGlow"></div>

<!-- MESSAGE -->

<div id="message">
Loading Camera...
</div>

<!-- CAKE -->

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake"></div>

</div>

<!-- HAPPY BIRTHDAY -->

<div id="birthday">

    <p>🎉🎂🎉</p>

    <h1>HAPPY BIRTHDAY</h1>

</div>

<!-- MEDIAPIPE -->

<script src="https://unpkg.com/@mediapipe/face_mesh/face_mesh.js"></script>

<script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

const faceGlow =
document.getElementById("faceGlow");

let blown = false;

/* CONFETTI */

function confetti(){

    for(let i=0;i<120;i++){

        const c =
        document.createElement("div");

        c.className = "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* FACE MESH */

const faceMesh =
new FaceMesh({

    locateFile:(file)=>{

        return `https://unpkg.com/@mediapipe/face_mesh/${file}`;
    }
});

faceMesh.setOptions({

    maxNumFaces:1,

    refineLandmarks:true,

    minDetectionConfidence:0.5,

    minTrackingConfidence:0.5
});

/* RESULTS */

faceMesh.onResults(results=>{

    if(
        results.multiFaceLandmarks &&
        results.multiFaceLandmarks.length > 0
    ){

        faceGlow.style.display =
        "block";

        cakeContainer.style.display =
        "block";

        const landmarks =
        results.multiFaceLandmarks[0];

        /*
        MOUTH POINTS
        */

        const upperLip =
        landmarks[13];

        const lowerLip =
        landmarks[14];

        /*
        OPEN MOUTH DETECTION
        */

        const mouthOpen =
        Math.abs(
            lowerLip.y -
            upperLip.y
        );

        if(!blown){

            message.innerHTML =
            "Open mouth to blow 🎂";
        }

        console.log(mouthOpen);

        /*
        BLOW DETECTION
        */

        if(
            mouthOpen > 0.055 &&
            !blown
        ){

            blown = true;

            document
            .querySelectorAll(".flame")
            .forEach(flame=>{

                flame.style.display =
                "none";
            });

            message.style.display =
            "none";

            birthday.style.display =
            "block";

            confetti();
        }

    }else{

        faceGlow.style.display =
        "none";

        cakeContainer.style.display =
        "none";

        if(!blown){

            message.innerHTML =
            "Find a face...";
        }
    }
});

/* START CAMERA */

async function start(){

    try{

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                facingMode:"user",
                width:640,
                height:480
            },

            audio:false
        });

        video.srcObject =
        stream;

        await video.play();

        const camera =
        new Camera(video,{

            onFrame:async()=>{

                await faceMesh.send({
                    image:video
                });
            },

            width:640,
            height:480
        });

        camera.start();

        message.innerHTML =
        "Find a face...";

    }catch(err){

        console.log(err);

        alert(
        "Camera permission denied"
        );
    }
}

start();

</script>

</body>
</html>
