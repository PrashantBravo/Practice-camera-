<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Birthday Filter</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0;
    left:0;
    transform:scaleX(-1);
}

#message{
    position:fixed;
    top:30px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
    z-index:100;
    text-shadow:0 0 10px black;
}

#cakeContainer{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    z-index:100;
}

.candles{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:-10px;
}

.candle{
    width:12px;
    height:50px;
    background:white;
    border-radius:4px;
    position:relative;
}

.flame{
    width:18px;
    height:18px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
    animation:flicker .2s infinite alternate;
}

@keyframes flicker{
    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.2);
    }
}

#cake{
    width:260px;
    height:120px;
    background:pink;
    border-radius:20px;
    border-bottom:10px solid hotpink;
}

#birthday{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    display:none;
    z-index:200;
}

#birthday h1{
    font-size:3rem;
    text-shadow:0 0 20px hotpink;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

</style>
</head>

<body>

<video
id="video"
autoplay
playsinline
muted>
</video>

<div id="message">
Loading AI...
</div>

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake"></div>

</div>

<div id="birthday">

    <h1>🎉 HAPPY BIRTHDAY 🎂</h1>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

let model;

let blown = false;

/* CONFETTI */

function confetti(){

    for(let i=0;i<100;i++){

        const c =
        document.createElement("div");

        c.className =
        "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* CAMERA */

async function setupCamera(){

    const stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{
            facingMode:"user"
        },

        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{

        video.onloadedmetadata = ()=>{

            resolve(video);
        };
    });
}

/* LOAD MODEL */

async function loadModel(){

    await tf.setBackend("webgl");

    await tf.ready();

    model =
    await faceLandmarksDetection
    .load(
        faceLandmarksDetection
        .SupportedPackages
        .mediapipeFacemesh
    );

    console.log("MODEL LOADED");

    message.innerHTML =
    "Find a face...";
}

/* DETECT */

async function detect(){

    const predictions =
    await model.estimateFaces({

        input:video
    });

    if(predictions.length > 0){

        cakeContainer.style.display =
        "block";

        if(!blown){

            message.innerHTML =
            "Open mouth to blow 🎂";
        }

        const keypoints =
        predictions[0].scaledMesh;

        /*
        lips
        */

        const upperLip =
        keypoints[13];

        const lowerLip =
        keypoints[14];

        const mouthOpen =
        Math.abs(
            lowerLip[1] -
            upperLip[1]
        );

        console.log(mouthOpen);

        if(
            mouthOpen > 18 &&
            !blown
        ){

            blown = true;

            document
            .querySelectorAll(".flame")
            .forEach(f=>{

                f.style.display =
                "none";
            });

            message.style.display =
            "none";

            birthday.style.display =
            "block";

            confetti();
        }

    }else{

        cakeContainer.style.display =
        "none";

        if(!blown){

            message.innerHTML =
            "Find a face...";
        }
    }

    requestAnimationFrame(detect);
}

/* START */

async function start(){

    try{

        await setupCamera();

        await loadModel();

        detect();

    }catch(err){

        console.log(err);

        alert("AI failed to load");
    }
}

start();

</script>

</body>
</html>
