<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Birthday AR Filter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:black;
}

/* VIDEO */

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    filter:
    brightness(1.05)
    contrast(1.05)
    saturate(1.15)
    blur(.3px);
}

/* BEAUTY GLOW */

#beautyGlow{
    position:fixed;
    inset:0;
    background:
    radial-gradient(
    circle,
    rgba(255,182,193,.08),
    transparent 60%
    );

    pointer-events:none;
    z-index:5;
}

/* MESSAGE */

#message{
    position:fixed;
    top:30px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
    z-index:100;
    text-shadow:0 0 15px black;
}

/* FACE SPARKLES */

.sparkle{
    position:fixed;
    font-size:20px;
    animation:sparkleAnim 1s linear infinite;
    z-index:50;
    pointer-events:none;
}

@keyframes sparkleAnim{

    0%{
        opacity:0;
        transform:translateY(0) scale(0);
    }

    50%{
        opacity:1;
        transform:translateY(-10px) scale(1);
    }

    100%{
        opacity:0;
        transform:translateY(-20px) scale(0);
    }
}

/* BALLOONS */

.balloon{
    position:fixed;
    bottom:-150px;
    font-size:60px;
    animation:floatUp linear infinite;
    z-index:30;
}

@keyframes floatUp{

    to{
        transform:translateY(-120vh);
    }
}

/* CAKE */

#cakeContainer{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    display:none;
    animation:floatCake 2s ease-in-out infinite;
}

@keyframes floatCake{

    0%{
        transform:translateX(-50%)
        translateY(0);
    }

    50%{
        transform:translateX(-50%)
        translateY(-10px);
    }

    100%{
        transform:translateX(-50%)
        translateY(0);
    }
}

.candles{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:-10px;
}

.candle{
    width:14px;
    height:55px;
    background:white;
    border-radius:5px;
    position:relative;
}

.flame{
    width:18px;
    height:22px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
    animation:flicker .15s infinite alternate;
}

@keyframes flicker{

    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.2);
    }
}

/* SMOKE */

.smoke{
    position:absolute;
    width:20px;
    height:20px;
    background:rgba(200,200,200,.5);
    border-radius:50%;
    animation:smokeUp 2s linear forwards;
}

@keyframes smokeUp{

    to{
        transform:
        translateY(-100px)
        scale(2);

        opacity:0;
    }
}

/* CAKE */

#cake{
    width:300px;
    height:140px;
    background:
    linear-gradient(
    to bottom,
    #ff9ecb,
    #ff5ca8
    );

    border-radius:25px;
    border-bottom:10px solid #ff2f92;
    position:relative;
}

#cake::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:35px;
    background:white;
    border-radius:50%;
}

/* HAPPY BIRTHDAY */

#birthday{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    display:none;
    z-index:300;
    animation:pop 1s ease;
}

#birthday h1{
    font-size:4rem;
    text-shadow:0 0 25px hotpink;
}

#birthday p{
    font-size:6rem;
}

@keyframes pop{

    from{
        transform:
        translate(-50%,-50%)
        scale(0);
        opacity:0;
    }

    to{
        transform:
        translate(-50%,-50%)
        scale(1);
        opacity:1;
    }
}

/* CONFETTI */

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    top:-10px;
    z-index:200;
    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

/* SELFIE BUTTON */

#captureBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:400;
    border:none;
    background:white;
    color:black;
    padding:14px 18px;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

/* CAPTURE IMAGE */

#snapshot{
    display:none;
}

</style>
</head>

<body>

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="snapshot"></canvas>

<div id="beautyGlow"></div>

<div id="message">
Loading Camera...
</div>

<!-- BALLOONS -->

<div class="balloon"
style="left:5%;animation-duration:12s;">
🎈
</div>

<div class="balloon"
style="left:25%;animation-duration:10s;">
🎈
</div>

<div class="balloon"
style="left:50%;animation-duration:14s;">
🎈
</div>

<div class="balloon"
style="left:75%;animation-duration:11s;">
🎈
</div>

<div class="balloon"
style="left:90%;animation-duration:13s;">
🎈
</div>

<!-- CAKE -->

<div id="cakeContainer">

    <div class="candles">

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

        <div class="candle">
            <div class="flame"></div>
        </div>

    </div>

    <div id="cake"></div>

</div>

<!-- BIRTHDAY -->

<div id="birthday">

    <p>🎉🎂🎉</p>

    <h1>HAPPY BIRTHDAY</h1>

</div>

<!-- CAPTURE -->

<button id="captureBtn">
📸 Capture
</button>

<!-- MUSIC -->

<audio
id="music"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<!-- MEDIAPIPE -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video =
document.getElementById("video");

const message =
document.getElementById("message");

const cakeContainer =
document.getElementById("cakeContainer");

const birthday =
document.getElementById("birthday");

const music =
document.getElementById("music");

const captureBtn =
document.getElementById("captureBtn");

const snapshot =
document.getElementById("snapshot");

let blown = false;

/* CONFETTI */

function confetti(){

    for(let i=0;i<150;i++){

        const c =
        document.createElement("div");

        c.className =
        "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        `hsl(${Math.random()*360},
        100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },5000);
    }
}

/* SPARKLES */

function sparkle(){

    const s =
    document.createElement("div");

    s.className =
    "sparkle";

    s.innerHTML = "✨";

    s.style.left =
    Math.random()*100 + "vw";

    s.style.top =
    Math.random()*100 + "vh";

    document.body.appendChild(s);

    setTimeout(()=>{
        s.remove();
    },1000);
}

setInterval(sparkle,300);

/* SMOKE */

function smoke(){

    document
    .querySelectorAll(".candle")
    .forEach(candle=>{

        const s =
        document.createElement("div");

        s.className =
        "smoke";

        s.style.left =
        candle.offsetLeft + "px";

        candle.appendChild(s);

        setTimeout(()=>{
            s.remove();
        },2000);
    });
}

/* FACE MESH */

const faceMesh =
new window.FaceMesh({

    locateFile:(file)=>{

        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
});

faceMesh.setOptions({

    maxNumFaces:1,

    refineLandmarks:true,

    minDetectionConfidence:.5,

    minTrackingConfidence:.5
});

/* RESULTS */

faceMesh.onResults(results=>{

    if(
        results.multiFaceLandmarks &&
        results.multiFaceLandmarks.length > 0
    ){

        cakeContainer.style.display =
        "block";

        const landmarks =
        results.multiFaceLandmarks[0];

        const upperLip =
        landmarks[13];

        const lowerLip =
        landmarks[14];

        const mouthOpen =
        Math.abs(
            lowerLip.y -
            upperLip.y
        );

        if(!blown){

            message.innerHTML =
            "Open mouth to blow 🎂";
        }

        if(
            mouthOpen > 0.055 &&
            !blown
        ){

            blown = true;

            document
            .querySelectorAll(".flame")
            .forEach(flame=>{

                flame.style.display =
                "none";
            });

            smoke();

            message.style.display =
            "none";

            birthday.style.display =
            "block";

            confetti();

            music.play();
        }

    }else{

        cakeContainer.style.display =
        "none";

        if(!blown){

            message.innerHTML =
            "Find a face...";
        }
    }
});

/* CAMERA */

async function start(){

    const stream =
    await navigator
    .mediaDevices
    .getUserMedia({

        video:{
            facingMode:"user",
            width:640,
            height:480
        },

        audio:false
    });

    video.srcObject = stream;

    await video.play();

    const camera =
    new window.Camera(video,{

        onFrame:async()=>{

            await faceMesh.send({
                image:video
            });
        },

        width:640,
        height:480
    });

    camera.start();

    message.innerHTML =
    "Find a face...";
}

start();

/* SELFIE */

captureBtn.onclick = ()=>{

    snapshot.width =
    video.videoWidth;

    snapshot.height =
    video.videoHeight;

    const ctx =
    snapshot.getContext("2d");

    ctx.drawImage(
        video,
        0,
        0
    );

    const link =
    document.createElement("a");

    link.download =
    "birthday-filter.png";

    link.href =
    snapshot.toDataURL();

    link.click();
};

</script>

</body>
</html>
